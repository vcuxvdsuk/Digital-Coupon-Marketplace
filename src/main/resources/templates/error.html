<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Error | Coupon Marketplace</title>
        <link rel="stylesheet" href="/styles.css" />
    </head>
    <body>
        <header class="site-header">
            <div class="brand"><a th:href="@{/}">Coupon Marketplace</a></div>
            <nav>
                <a th:href="@{/}">Shop</a>
                <a th:href="@{/admin}">Admin</a>
            </nav>
        </header>

        <main class="page-content result-page">
            <section class="result-card error-card">
                <h1>Something went wrong</h1>
                <p th:text="${error}"></p>
                <a th:href="@{/}" class="secondary-button">Back to Shop</a>
            </section>
        </main>
    </body>
</html>
