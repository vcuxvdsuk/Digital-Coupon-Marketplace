<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Admin | Coupon Marketplace</title>
        <link rel="stylesheet" href="/styles.css" />
    </head>
    <body>
        <header class="site-header">
            <div class="brand"><a th:href="@{/}">Coupon Marketplace</a></div>
            <nav>
                <a th:href="@{/}">Shop</a>
                <a th:href="@{/admin}">Admin</a>
            </nav>
        </header>

        <main class="page-content admin-page">
            <section class="panel create-panel">
                <h1>Admin Panel</h1>
                <p>Create a new coupon and manage the marketplace inventory.</p>
                <form
                    th:action="@{/admin/create}"
                    th:object="${createCouponRequest}"
                    method="post"
                    class="form-grid"
                >
                    <label>
                        Name
                        <input type="text" th:field="*{name}" required />
                    </label>
                    <label>
                        Description
                        <textarea th:field="*{description}" rows="3"></textarea>
                    </label>
                    <label>
                        Image URL
                        <input type="text" th:field="*{imageUrl}" required />
                    </label>
                    <label>
                        Cost Price
                        <input
                            type="number"
                            step="0.01"
                            th:field="*{costPrice}"
                            required
                        />
                    </label>
                    <label>
                        Margin Percentage
                        <input
                            type="number"
                            step="0.01"
                            th:field="*{marginPercentage}"
                            required
                        />
                    </label>
                    <label>
                        Value Type
                        <select th:field="*{valueType}">
                            <option
                                th:each="type : ${T(couponmarketplace.entity.ValueType).values()}"
                                th:value="${type}"
                                th:text="${type}"
                            ></option>
                        </select>
                    </label>
                    <label>
                        Value
                        <input type="text" th:field="*{value}" required />
                    </label>
                    <button type="submit" class="primary-button">
                        Create Coupon
                    </button>
                </form>
            </section>

            <section class="panel inventory-panel">
                <div class="section-header">
                    <h2>Available Coupons</h2>
                    <p>Review your active offers and their sale prices.</p>
                </div>
                <div class="product-grid">
                    <div class="product-card" th:each="product : ${products}">
                        <img th:src="${product.imageUrl}" alt="Coupon image" />
                        <div class="product-info">
                            <h3 th:text="${product.name}"></h3>
                            <h4
                                th:text="${product.id != null ? product.id : 'N/A'}"
                            ></h4>
                            <p
                                class="description"
                                th:text="${product.description}"
                            ></p>
                            <p class="price">
                                Sell Price:
                                <span
                                    th:text="${product.price} + ' USD'"
                                ></span>
                            </p>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </body>
</html>
