<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Admin | Coupon Marketplace</title>
        <link rel="stylesheet" href="/styles.css" />
    </head>
    <body>
        <header class="site-header">
            <div class="brand"><a th:href="@{/}">Coupon Marketplace</a></div>
            <nav>
                <a th:href="@{/}">Shop</a>
                <a th:href="@{/admin}">Admin</a>
            </nav>
        </header>

        <main class="page-content admin-page">
            <section class="panel create-panel">
                <h1>Admin Panel</h1>
                <p>Create a new coupon and manage the marketplace inventory.</p>
                <form
                    th:action="@{/admin/create}"
                    th:object="${createCouponRequest}"
                    method="post"
                    class="form-grid"
                >
                    <div
                        th:if="${#fields.hasErrors()}"
                        class="result-card error-card"
                    >
                        <div class="result-details">
                            <strong>There were validation errors:</strong>
                            <ul>
                                <li
                                    th:each="err : ${#fields.errors()}"
                                    th:text="${err}"
                                ></li>
                            </ul>
                        </div>
                    </div>
                    <label>
                        Name
                        <input
                            type="text"
                            th:field="*{name}"
                            required
                            th:classappend="${#fields.hasErrors('name')} ? ' input-error' : ''"
                        />
                        <div
                            th:if="${#fields.hasErrors('name')}"
                            th:errors="*{name}"
                            class="error"
                        ></div>
                    </label>
                    <label>
                        Description
                        <textarea th:field="*{description}" rows="3"></textarea>
                    </label>
                    <label>
                        Image URL
                        <input
                            type="text"
                            th:field="*{imageUrl}"
                            required
                            th:classappend="${#fields.hasErrors('imageUrl')} ? ' input-error' : ''"
                        />
                        <div
                            th:if="${#fields.hasErrors('imageUrl')}"
                            th:errors="*{imageUrl}"
                            class="error"
                        ></div>
                    </label>
                    <label>
                        Cost Price
                        <input
                            type="number"
                            step="0.01"
                            th:field="*{costPrice}"
                            required
                            th:classappend="${#fields.hasErrors('costPrice')} ? ' input-error' : ''"
                        />
                        <div
                            th:if="${#fields.hasErrors('costPrice')}"
                            th:errors="*{costPrice}"
                            class="error"
                        ></div>
                    </label>
                    <label>
                        Margin Percentage
                        <input
                            type="number"
                            step="0.01"
                            th:field="*{marginPercentage}"
                            required
                            th:classappend="${#fields.hasErrors('marginPercentage')} ? ' input-error' : ''"
                        />
                        <div
                            th:if="${#fields.hasErrors('marginPercentage')}"
                            th:errors="*{marginPercentage}"
                            class="error"
                        ></div>
                    </label>

                    <label>
                        Value Type
                        <select
                            th:field="*{valueType}"
                            th:classappend="${#fields.hasErrors('valueType')} ? ' input-error' : ''"
                        >
                            <option
                                th:each="type : ${T(couponmarketplace.entity.ValueType).values()}"
                                th:value="${type}"
                                th:text="${type}"
                            ></option>
                        </select>
                        <div
                            th:if="${#fields.hasErrors('valueType')}"
                            th:errors="*{valueType}"
                            class="error"
                        ></div>
                    </label>
                    <label>
                        Value
                        <input
                            type="text"
                            th:field="*{value}"
                            required
                            th:classappend="${#fields.hasErrors('value')} ? ' input-error' : ''"
                        />
                        <div
                            th:if="${#fields.hasErrors('value')}"
                            th:errors="*{value}"
                            class="error"
                        ></div>
                    </label>
                    <button type="submit" class="primary-button">
                        Create Coupon
                    </button>
                </form>
            </section>

            <section class="panel inventory-panel">
                <div class="section-header">
                    <h2>Available Coupons</h2>
                    <p>Review your active offers and their sale prices.</p>
                </div>
                <div class="product-grid">
                    <div class="product-card" th:each="product : ${products}">
                        <img th:src="${product.imageUrl}" alt="Coupon image" />
                        <div class="product-info">
                            <h3 th:text="${product.name}"></h3>
                            <h4
                                th:text="${product.id != null ? product.id : 'N/A'}"
                            ></h4>
                            <p
                                class="description"
                                th:text="${product.description}"
                            ></p>
                            <p class="price">
                                Sell Price:
                                <span
                                    th:text="${product.price} + ' USD'"
                                ></span>
                            </p>
                            <p
                                class="status"
                                th:text="${product.sold} ? 'Sold' : 'Available'"
                                th:classappend="${product.sold} ? ' status-sold' : ' status-available'"
                            ></p>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </body>
</html>
